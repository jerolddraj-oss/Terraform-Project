name: Terraform Azure CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform-infra/env/dev     # 🔥 change based on your structure

    steps:
    # Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # Install Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Azure Login (IMPORTANT)
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Debug (helps fix your "8 sec failure")
    - name: Debug Info
      run: |
        pwd
        ls -la
        terraform version

    # Terraform Init
    - name: Terraform Init
      run: terraform init

    # Terraform Format Check
    - name: Terraform Format
      run: terraform fmt -check

    # Terraform Validate
    - name: Terraform Validate
      run: terraform validate

    # Terraform Plan
    - name: Terraform Plan
      run: terraform plan -input=false

    # Terraform Apply (ONLY on main push)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false
